  /manage/projects/{projectId}/join-project:
    post:
      tags:
      - Projects
      summary: Join a project
      description: 'If the project''s organization allows autojoin (`allowAutoJoin` attribute is set to `true`),

        all members of the organization, its maintainers and superadmins are allowed to join the project.

        Otherwise only members of the organization can join the project.


        An optional expiration (in seconds) and reason for joining can be added to the request.'
      operationId: post_/manage/projects/{projectId}/join-project::ProjectJoinAction
      parameters:
      - name: projectId
        in: path
