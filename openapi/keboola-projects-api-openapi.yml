                approver: null
                canApproveMergeRequests: true
        '400':
          description: Returned when the request body is invalid or the user is not activated.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to update project users.
        '404':
          description: Returned when the project or user does not exist.
components:
  schemas:
    UserResponse:
      required:
      - id
      - name
      - email
      - mfaEnabled
      - features
      - canAccessLogs
      - isSuperAdmin
      properties:
        id:
          description: User identifier.
          type: integer
          example: 2
        name:
          description: User full name.
          type: string
          example: Martin
        email:
          description: User email address.
          type: string
          example: martin@keboola.com
        mfaEnabled:
          description: Whether MFA is enabled for the user.
          type: boolean
          example: true
        features:
          description: List of assigned features.
          type: array
          items:
            type: string
          example:
          - inline-manual
        canAccessLogs:
          description: Whether the user can access logs.
          type: boolean
          example: true
        isSuperAdmin:
          description: Whether the user has super admin privileges.
          type: boolean
          example: true
      type: object
      example:
        id: 2
        name: Martin
        email: martin@keboola.com
        mfaEnabled: true
        features:
        - inline-manual
        canAccessLogs: true
        isSuperAdmin: true
    ProjectResponse:
      required:
      - id
      - name
      - type
      - region
      - features
      - dataSizeBytes
      - rowsCount
      - hasMysql
      - hasSynapse
      - hasSnowflake
      - hasExasol
      - hasTeradata
      - hasBigquery
      - defaultBackend
      - hasTryModeOn
      - limits
      - metrics
      - isDisabled
      - dataRetentionTimeInDays
      - isBYODB
      - assignedBackends
      properties:
        id:
          description: Project identifier.
          type: integer
          example: 4088
        name:
          description: Project name.
          type: string
          example: My Demo
        type:
          description: Project type.
          type: string
          example: production
        region:
          description: Project region.
          type: string
          example: us-east-1
        created:
          description: Project creation time.
          type: string
          format: date-time
          example: '2017-12-11T09:02:13+01:00'
          nullable: true
        expires:
          description: Project expiration time.
          type: string
          format: date-time
          example: null
          nullable: true
        features:
          description: Enabled features.
          type: array
          items:
            type: string
          example: []
        dataSizeBytes:
          description: Total data size.
          type: integer
          example: 22691704832
        rowsCount:
          description: Total rows count.
          type: integer
          example: 4295727047
        hasMysql:
          type: boolean
          example: false
        hasSynapse:
          type: boolean
          example: false
        hasSnowflake:
          type: boolean
          example: true
        hasExasol:
          type: boolean
          example: false
        hasTeradata:
          type: boolean
          example: false
        hasBigquery:
          type: boolean
          example: false
        defaultBackend:
          type: string
          example: snowflake
        hasTryModeOn:
          type: string
          example: '0'
        limits:
          description: Project limits keyed by limit name; values may be integers or floats.
          type: object
          additionalProperties:
            properties:
              name:
                type: string
                example: storage.dataSizeBytes
              value:
                type: number
                example: 50000000000
            type: object
        metrics:
          description: Project metrics keyed by metric name; values may be integers or floats.
          type: object
          additionalProperties:
            properties:
              name:
                type: string
                example: storage.dataSizeBytes
              value:
                type: number
                example: 22691704832
            type: object
        isDisabled:
          type: boolean
          example: false
        billedMonthlyPrice:
          type: integer
          example: null
          nullable: true
        dataRetentionTimeInDays:
          type: integer
          example: 7
        isBYODB:
          type: boolean
          example: false
        assignedBackends:
          type: array
          items:
            type: string
          example:
          - snowflake
        fileStorageProvider:
          type: string
          example: aws
          nullable: true
        payAsYouGo:
          properties:
            purchasedCredits:
              type: number
              format: float
              example: 123
          type: object
          nullable: true
        disabled:
          properties:
            reason:
              type: string
              example: Quota exceeded
            estimatedEndTime:
              type: string
              format: date-time
              example: '2024-01-01T00:00:00+01:00'
              nullable: true
          type: object
          nullable: true
      type: object
      example:
        id: 4088
        name: My Demo
        type: production
        region: us-east-1
        created: '2017-12-11T09:02:13+01:00'
        expires: null
        features: []
        dataSizeBytes: 22691704832
        rowsCount: 4295727047
        hasMysql: false
        hasSnowflake: true
        hasSynapse: false
        hasExasol: false
        hasTeradata: false
        hasBigquery: false
        defaultBackend: snowflake
        hasTryModeOn: '0'
        limits:
          components.jobsParallelism:
            name: components.jobsParallelism
            value: 10
          kbc.adminsCount:
            name: kbc.adminsCount
            value: 10
          storage.dataSizeBytes:
            name: storage.dataSizeBytes
            value: 50000000000
          storage.jobsParallelism:
            name: storage.jobsParallelism
            value: 10
        metrics:
          kbc.adminsCount:
            name: kbc.adminsCount
            value: 1
          storage.dataSizeBytes:
            name: storage.dataSizeBytes
            value: 22691704832
          storage.rowsCount:
            name: storage.rowsCount
            value: 4295727047
        isDisabled: false
        billedMonthlyPrice: null
        dataRetentionTimeInDays: 7
        isBYODB: false
        assignedBackends:
        - snowflake
        fileStorageProvider: aws
    ProjectDetailResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ProjectResponse'
      - properties:
          organization:
            description: Organization the project belongs to.
            properties:
              id:
                type: integer
                example: 5
              name:
                type: string
                example: Martinovo
              crmId:
                type: string
                example: ''
                nullable: true
              activityCenterProjectId:
                description: ActivityCenter project ID (empty string when unset).
                type: string
                example: ''
                nullable: true
              created:
                type: string
                format: date-time
                example: '2013-12-31T11:22:33+01:00'
              allowAutoJoin:
                type: boolean
                example: true
            type: object
          fileStorage:
            description: File storage assigned to the project.
            properties:
              id:
                type: integer
                example: 2
              awsKey:
                type: string
                example: AKIAXXXXXXXXXXXXXXXXX
              region:
                type: string
                example: us-east-1
              filesBucket:
                type: string
                example: kbc-sapi-files
              owner:
                type: string
                example: keboola
              isDefault:
                type: boolean
                example: true
              created:
                type: string
                example: ''
              creator:
                properties:
                  id:
                    type: integer
                    example: 0
                  name:
                    type: string
                    example: null
                    nullable: true
                type: object
            type: object
            nullable: true
          backends:
            description: Storage backends assigned to the project, keyed by backend name.
            properties:
              snowflake:
                properties:
                  id:
                    type: integer
                    example: 353
                  host:
                    type: string
                    example: keboola.snowflakecomputing.com
                  region:
                    type: string
                    example: us-east-1
                  owner:
                    type: string
                    example: keboola
                type: object
            type: object
          timezone:
            description: Project timezone.
            type: string
            example: Europe/Bratislava
            nullable: true
    AssignStorageBackendRequest:
      required:
      - storageBackendId
      properties:
        storageBackendId:
          description: Identifier of the storage backend to assign.
          type: integer
          example: 32
      type: object
    ProjectReviewersUpdateRequest:
      required:
      - adminIds
      properties:
        adminIds:
          description: List of admin IDs that should be allowed to approve merge requests.
          type: array
          items:
            type: integer
          example:
          - 123
          - 456
      type: object
    MetadataRequest:
      required:
      - provider
      - metadata
      properties:
        provider:
          description: Metadata provider.
          type: string
          enum:
          - user
          - system
        metadata:
          description: List of metadata entries.
          type: array
          items:
            required:
            - key
            - value
            properties:
              key:
                description: Metadata key.
                type: string
              value:
                description: Metadata value.
                type: string
            type: object
      type: object
    ProjectCreditRequest:
      required:
      - amount
      - description
      properties:
        amount:
          description: Credit amount.
          type: number
          format: float
        description:
          description: Credit description.
          type: string
      type: object
    ProjectUpdateRequest:
      properties:
        name:
          description: Project name.
          type: string
          nullable: true
        defaultBackend:
          description: Default storage backend.
          type: string
          nullable: true
        hasTryModeOn:
          description: Enable try mode.
          type: boolean
          nullable: true
        type:
          description: Project type.
          type: string
          nullable: true
        expirationDays:
          description: Project expiration in days.
          type: integer
          nullable: true
        billedMonthlyPrice:
          description: Billed monthly price.
          type: integer
          nullable: true
        dataRetentionTimeInDays:
          description: Data retention time in days. Applicable for Snowflake projects only.
          type: integer
          nullable: true
        timezone:
          description: Project time zone (e.g., “America/New_York”, “Europe/London”). Only supported with the BigQuery backend.
          type: string
          nullable: true
      type: object
    OrganizationCreateProjectResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ProjectResponse'
      - properties:
          fileStorage:
            description: File storage assigned to the project.
            type: object
          backends:
            description: Default backend configuration for the project.
            type: object
    ProjectInvitationDetailResponse:
      required:
      - id
      - user
      - creator
      properties:
        id:
          description: Invitation identifier.
          type: integer
          example: 113
        created:
          description: Invitation creation timestamp.
          type: string
          format: date-time
          example: 2018-07-10T11:13:00+0200
          nullable: true
        expires:
          description: Invitation expiration timestamp.
          type: string
          format: date-time
          example: null
          nullable: true
        reason:
          description: Reason for the invitation.
          type: string
          example: ''
          nullable: true
        role:
          description: Role assigned in the invitation.
          type: string
          example: admin
          nullable: true
        user:
          description: Invited user.
          properties:
            id:
              type: integer
              example: 125
            name:
              type: string
              example: test user 3
            email:
              type: string
              example: spam@keboola.com
          type: object
        creator:
          description: User who created the invitation.
          properties:
            id:
              type: integer
              example: 2
            name:
              type: string
              example: Martin Halamicek
            email:
              type: string
              example: martin@keboola.com
          type: object
      type: object
      example:
        id: 113
        created: 2018-07-10T11:13:00+0200
        expires: null
        reason: ''
        role: admin
        user:
          id: 125
          name: test user 3
          email: spam@keboola.com
        creator:
          id: 2
          name: Martin Halamicek
          email: martin@keboola.com
    ProjectTemplateResponse:
      required:
      - id
      - name
      - description
      - hasTryModeOn
      - defaultBackend
      properties:
        id:
          description: Project template string identifier.
          type: string
          example: poc15Days
        name:
          description: Template name.
          type: string
          example: POC 15 days
        description:
          description: Template description.
          type: string
          example: Proof of concept. 15 days trial.
        expirationDays:
          description: Number of days until project expires.
          type: integer
          example: 15
          nullable: true
        billedMonthlyPrice:
          description: Monthly billing price.
          type: integer
          example: null
          nullable: true
        hasTryModeOn:
          description: Whether try mode is enabled.
          type: boolean
          example: false
        defaultBackend:
          description: Default storage backend.
          type: string
          example: snowflake
      type: object
      example:
        id: poc15Days
        name: POC 15 days
        description: Proof of concept. 15 days trial.
        expirationDays: 15
        billedMonthlyPrice: null
        hasTryModeOn: false
        defaultBackend: snowflake
    ProjectJoinRequestDetailResponse:
      required:
      - id
      - user
      properties:
        id:
          description: Join request identifier.
          type: integer
          example: 1234
        created:
          description: Join request creation timestamp.
          type: string
          format: date-time
          example: 2016-02-22T15:01:13+0200
          nullable: true
        expires:
          description: Join request expiration timestamp.
          type: string
          format: date-time
          example: 2016-03-22T15:01:13+0200
          nullable: true
        reason:
          description: Reason for the join request.
          type: string
          example: temporary test
          nullable: true
        user:
          description: User who created the join request.
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: admin 1
            email:
              type: string
              example: dev@keboola.com
          type: object
      type: object
      example:
        id: 1234
        created: 2016-02-22T15:01:13+0200
        expires: 2016-03-22T15:01:13+0200
        reason: temporary test
        user:
          id: 1
          name: admin 1
          email: dev@keboola.com
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-StorageApi-Token
