  /manage/projects/{projectId}/reviewers:
    get:
      tags:
      - Projects
      summary: List project reviewers
      description: 'Returns the list of project members eligible to approve merge requests. If any member has been explicitly

        designated as a reviewer (via PUT), only those members are returned. If no one has been explicitly

        designated, all members with `admin` or `share` role are returned.


        Project must have the `branches-merge-requests` feature flag.'
      operationId: get_/manage/projects/{projectId}/reviewers::ProjectReviewersListAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the project.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 4088
      responses:
        '200':
          description: List of eligible reviewers.
          content:
            application/json:
              schema:
                type: array
                items:
                  required:
                  - id
                  - name
                  - email
                  properties:
                    id:
                      type: integer
                      example: 123
                    name:
                      type: string
                      example: John Doe
                    email:
                      type: string
                      example: john@example.com
                  type: object
              example:
              - id: 123
                name: John Doe
                email: john@example.com
              - id: 456
                name: Jane Smith
                email: jane@example.com
        '400':
          description: Returned when the project is missing the required `branches-merge-requests` feature flag.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the user does not have access to the project.
        '404':
          description: Returned when the project does not exist.
    put:
      tags:
      - Projects
      summary: Update project reviewers
      description: 'Sets which project members can approve merge requests. Accepts a list of admin IDs with replace semantics — listed admins get the flag, others lose it. Empty array removes all reviewers.


        Only admins with `admin` or `share` role can be set as reviewers. Project must have the `branches-merge-requests` feature flag.'
      operationId: put_/manage/projects/{projectId}/reviewers::ProjectReviewersUpdateAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the project.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 4088
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectReviewersUpdateRequest'
            example:
              adminIds:
              - 123
              - 456
      responses:
        '204':
          description: Reviewers updated successfully.
        '400':
          description: Returned when admin IDs do not belong to the project, when admins lack the required role, or when the project is missing the `branches-merge-requests` feature flag.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the user does not have permission to update reviewers.
        '404':
          description: Returned when the project does not exist.
