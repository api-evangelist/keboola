openapi: 3.0.0
info:
  title: Stream Service
  description: A service for continuously importing data to the Keboola platform.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
  version: '1.0'
paths:
  /:
    get:
      summary: Redirect to /v1
      operationId: ApiRootIndex
      tags:
      - documentation
      description: Redirect to /v1.
      responses:
        '301':
          description: Moved Permanently response.
  /v1:
    get:
      summary: List API name and link to documentation.
      operationId: ApiVersionIndex
      tags:
      - documentation
      description: List API name and link to documentation.
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/ServiceDetail'
                required:
                - api
                - documentation
  /v1/branches/{branchId}/aggregation/sources:
    get:
      summary: Aggregation endpoint for sources
      operationId: AggregationSources
      tags:
      - internal
      description: Details about sources for the UI.
      parameters:
      - name: afterId
        in: query
        required: false
        description: Request records after the ID.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of returned records.
        schema:
          type: integer
      - name: branchId
        in: path
        required: true
        description: ID of the branch or "default".
        schema:
          type: string
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/AggregatedSourcesResult'
                required:
                - projectId
                - branchId
                - page
                - sources
      security:
      - storage-api-token: []
  /v1/branches/{branchId}/sources:
    get:
      summary: List all sources
      operationId: ListSources
      tags:
      - configuration
      description: List all sources in the branch.
      parameters:
      - name: afterId
        in: query
        required: false
        description: Request records after the ID.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of returned records.
        schema:
          type: integer
      - name: branchId
        in: path
        required: true
        description: ID of the branch or "default".
        schema:
          type: string
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/SourcesList'
                required:
                - projectId
                - branchId
                - page
                - sources
      security:
      - storage-api-token: []
    post:
      summary: Create source
      operationId: CreateSource
      tags:
      - configuration
      description: Create a new source in the branch.
      parameters:
      - name: branchId
        in: path
        required: true
        description: ID of the branch or "default".
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/definitions/StreamCreateSourceRequestBody'
              required:
              - type
              - name
      responses:
        '202':
          description: Accepted response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/Task'
                required:
                - taskId
                - type
                - url
                - status
                - isFinished
                - createdAt
        '409':
          description: Conflict response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/GenericError'
                required:
                - statusCode
                - error
                - message
        '422':
          description: Unprocessable Entity response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/GenericError'
                required:
                - statusCode
                - error
                - message
      security:
      - storage-api-token: []
  /v1/branches/{branchId}/sources/{sourceId}:
    get:
      summary: Get source
      operationId: GetSource
      tags:
      - configuration
      description: Get the source definition.
      parameters:
      - name: branchId
        in: path
        required: true
        description: ID of the branch or "default".
        schema:
          type: string
      - name: sourceId
        in: path
        required: true
        description: Unique ID of the source.
        schema:
          type: string
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/Source'
                required:
                - projectId
                - branchId
                - sourceId
                - type
                - name
                - description
                - version
                - created
        '404':
          description: Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/GenericError'
                required:
                - statusCode
                - error
                - message
      security:
      - storage-api-token: []
    delete:
      summary: Delete source
      operationId: DeleteSource
      tags:
      - configuration
      description: 'Delete the source.


        With `cascade=true` the source and its sinks are hard-deleted (so the same
        name can be reused immediately) and the destination Keboola tables and their
        bucket are deleted as well.'
      parameters:
      - name: cascade
        in: query
        required: false
        description: Also delete the destination Keboola tables and bucket, and hard-delete
          the source so it can be recreated with the same name.
        schema:
          type: boolean
      - name: branchId
        in: path
        required: true
        description: ID of the branch or "default".
        schema:
          type: string
      - name: sourceId
        in: path
        required: true
        description: Unique ID of the source.
        schema:
          type: string
      responses:
        '202':
          description: Accepted response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/Task'
                required:
                - taskId
                - type
                - url
                - status
                - isFinished
                - createdAt
        '404':
          description: Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/definitions/GenericError'
                required:
