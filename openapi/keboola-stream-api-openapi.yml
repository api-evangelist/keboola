          description: Endpoint URL with the secret embedded as the last path segment.
            Convenient for SDKs that authenticate by URL only. The OpenTelemetry SDK
            automatically appends /v1/logs, /v1/metrics, or /v1/traces based on the
            signal type — do not append a signal path yourself. Most SDK exporters
            reject or silently strip the suffix.
          example: https://stream-in.keboola.com/otlp/123/my-source/EXAMPLE-SECRET-PLACEHOLDER-XXXXXXXXXXXXXXXXXXXXX
