  /v1/branches/{branchId}/sources/{sourceId}/rotate-secret:
    post:
      summary: Rotate source secret
      operationId: RotateSourceSecret
      tags:
      - configuration
      description: 'Regenerate the source''s 48-character secret without recreating
        the source.


        The sourceId is preserved; only the secret (and the URL that embeds it) changes.
