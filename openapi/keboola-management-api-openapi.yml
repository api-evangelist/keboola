        `billedMonthlyPrice` and `dataRetentionTimeInDays` fields can be changed only
        by a super admin.


        The `timezone` field is only supported on the BigQuery backend. Immediately
        after creating

        the project, it may take a while for the necessary permissions to be propagated
        in GCP.

        If you receive a 403 response, please try again several times.'
      operationId: put_/manage/projects/{projectId}::ProjectUpdateAction
      parameters:
      - name: projectId
        in: path
