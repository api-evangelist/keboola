      - name: id
        in: path
        description: Identifier of the organization.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 123
      responses:
        '204':
          description: Organization deleted successfully.
        '400':
          description: Returned when the organization cannot be deleted (e.g. it still
            has projects, or MFA is required).
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have access to the organization.
        '404':
          description: Returned when the organization does not exist.
    patch:
      tags:
      - Organizations
      summary: Update an organization
      description: Partial update of an organization.
      operationId: patch_/manage/organizations/{id}::OrganizationUpdateAction
      parameters:
      - name: id
        in: path
        description: Identifier of the organization.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Organization name.
                  type: string
                  example: POC
                maintainerId:
                  description: Assign the organization to another maintainer.
                  type: integer
                  example: 4
                allowAutoJoin:
                  description: Set whether superAdmins need approval to join the organization's
                    projects (default `true`).
                  type: boolean
                  example: true
                crmId:
                  description: Set CRM ID. Only maintainer members and superadmins
                    can change this.
                  type: string
                  example: '123456'
                  nullable: true
                activityCenterProjectId:
                  description: Set ActivityCenter ProjectId. Only maintainer members
                    and superadmins can change this.
                  type: integer
                  example: 123
                  nullable: true
                mfaRequired:
                  description: Toggle whether all members of or organization and its
                    projects must have enabled multi-factor authentication (default
                    `false`).
                  type: boolean
                  example: false
              type: object
            example:
              name: POC
              crmId: '123456'
      responses:
        '200':
          description: Organization updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationWithProjectsResponse'
              example:
                id: 123
                name: POC
                created: 2015-10-02T11:03:44+0200
                allowAutoJoin: true
                crmId: '123456'
                activityCenterProjectId: 123
                mfaRequired: false
                projects:
                - id: 123
                  name: Demo
                  created: '2014-11-11T08:40:51.620Z'
        '400':
          description: Returned when the provided parameters are invalid.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to update
            the organization.
        '404':
          description: Returned when the organization does not exist.
