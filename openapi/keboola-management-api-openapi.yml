          pattern: '[0-9]+'
        example: 4088
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
            example:
              name: Test - Rename project
              defaultBackend: snowflake
              type: demo
              expirationDays: 7
              billedMonthlyPrice: 2000
              dataRetentionTimeInDays: 20
              timezone: Europe/Bratislava
      responses:
        '200':
          description: Project detail response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          description: Returned when provided parameters are invalid (e.g. timezone
            not supported for the project backend).
        '401':
