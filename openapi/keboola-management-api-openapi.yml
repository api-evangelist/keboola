        combination already exist

        for the user, the data will be updated with the new value and timestamp.


        Each user can set only own metadata. Super admins can set everyone''s metadata.


        The path parameter accepts an integer user ID or an email address.'
      operationId: post_/manage/users/{idOrEmail}/metadata::UserSetMetadataAction
      parameters:
      - name: idOrEmail
        in: path
        description: User ID (integer) or email address.
        required: true
        schema:
          type: string
          pattern: '[^\/]*'
        example: john.doe@keboola.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataRequest'
            example:
              provider: user
              metadata:
              - key: KBC.SomeEnity.metadataKey
                value: Some value
              - key: someMetadataKey
                value: Some value
      responses:
        '201':
          description: Metadata set successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  properties:
                    id:
                      description: Metadata identifier.
                      type: integer
                      example: 123
                    provider:
                      description: Metadata provider.
                      type: string
                      example: user
                    timestamp:
                      description: Last update timestamp.
                      type: string
                      example: 2021-02-17T15:05:21+0100
                    key:
                      description: Metadata key.
                      type: string
                      example: KBC.SomeEnity.metadataKey
                    value:
                      description: Metadata value.
                      type: string
                      example: Some value
                  type: object
              example:
              - id: 123
                provider: user
                timestamp: 2021-02-17T15:05:21+0100
                key: KBC.SomeEnity.metadataKey
                value: Some value
              - id: 124
                provider: user
                timestamp: 2021-02-17T15:05:21+0100
                key: someMetadataKey
                value: Some value
        '400':
          description: Returned when the request body fails validation (missing provider/metadata,
            invalid key/value).
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the current admin cannot manage user metadata.
        '404':
          description: Returned when the user does not exist.
  /manage/users/{idOrEmail}/features/{featureName}:
    delete:
      tags:
      - SUPER - Features
      summary: Remove a user feature
      description: 'If the parameter `canBeManageByAdmin` of the feature is `false`,
        project features can be removed only by a super admin. If the `canBeManageByAdmin`
        parameter of the feature is `true`, the feature can be removed by an admin
        without super admin permission, but he can assign the feature only to himself.


        Organization and maintainer admin have no effect.'
      operationId: delete_/manage/users/{idOrEmail}/features/{featureName}::UserRemoveFeatureAction
      parameters:
      - name: idOrEmail
        in: path
        description: User ID or email.
        required: true
        schema:
          type: string
          pattern: '[^\/]*'
        example: john.doe@keboola.com
      - name: featureName
        in: path
        description: Feature name.
        required: true
        schema:
          type: string
          pattern: .+
        example: show-new-design
      responses:
        '200':
          description: User detail response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 2
                name: Martin Halamicek
                email: martin@keboola.com
                features:
                - inline-manual
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the current admin cannot manage the user.
        '404':
          description: Returned when the user or feature does not exist.
        '422':
          description: Returned when the feature cannot be managed via API.
  /manage/users/{idOrEmail}/super-admin:
    delete:
      tags:
      - Users
      summary: Remove super admin privilege from User
      description: Removes super admin privileges from the specified user. The path
        parameter accepts an integer user ID or an email address.
      operationId: delete_/manage/users/{idOrEmail}/super-admin::UserRemoveSuperAdminAction
      parameters:
      - name: idOrEmail
        in: path
        description: User ID (integer) or email address.
        required: true
        schema:
          type: string
          pattern: '[^\/]*'
        example: john.doe@keboola.com
      responses:
        '200':
          description: Updated user detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 2
                name: Corrected Spelling
                email: spelling@keboola.com
                features:
                - inline-manual
                mfaEnabled: true
                canAccessLogs: false
                isSuperAdmin: false
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the current admin is not a super admin.
        '404':
          description: Returned when the user does not exist.
components:
  schemas:
    EnqueueCommandRequest:
      description: CLI command enqueue request payload.
      required:
      - command
      properties:
        command:
          description: CLI command to execute.
          type: string
          example: storage:workers-list
        parameters:
          description: Optional command parameters appended to the CLI invocation.
          type: array
          items:
            type: string
          example:
          - --help
          - '23'
          default: []
      type: object
    DeletedProjectsListRequest:
      properties:
        limit:
          description: Maximum number of projects to return.
          type: integer
          nullable: true
        offset:
          description: Offset for paginated results.
          type: integer
          nullable: true
        organizationId:
          description: Filter projects by organization identifier.
          type: integer
          nullable: true
        name:
          description: Filter projects by name.
          type: string
          nullable: true
      type: object
    CancelProjectDeletionRequest:
      properties:
        expirationDays:
          description: Days to postpone project deletion again.
          type: integer
          nullable: true
      type: object
    ProjectPurgeRequest:
      properties:
        ignoreBackendErrors:
          description: Ignore errors when purging data from backend storage.
          type: boolean
          default: false
      type: object
    FeatureCreateRequest:
      required:
      - name
      - type
      - title
      - description
      properties:
        name:
          description: Feature name (programmatic name).
          type: string
          example: show-new-design
        type:
          description: Feature type.
          type: string
          example: admin
          enum:
          - admin
          - project
        title:
          description: Feature title (display name).
          type: string
          example: Show new design
        description:
          description: Short description of the feature.
          type: string
          example: Users with this feature will see new UI
        canBeManageByAdmin:
          description: If true, the feature can be assigned by a user without the
            superadmin role.
          type: boolean
          example: false
          default: false
        canBeManagedViaAPI:
          description: Enables or disables the ability to assign the project/admin
            feature using the API.
          type: boolean
          example: true
          default: true
      type: object
    FeatureListRequest:
      properties:
        type:
          description: Optional feature type filter.
          type: string
          nullable: true
          enum:
          - admin
          - project
          - global
      type: object
    FeatureUpdateRequest:
      required: []
      properties:
        title:
          description: Feature title (display name).
          type: string
          example: Show new design
          nullable: true
        description:
          description: Short description of the feature.
          type: string
          example: Users with this feature will see new UI
          nullable: true
        canBeManageByAdmin:
          description: If true, the feature can be assigned by a user without the
            superadmin role.
          type: boolean
          example: false
          nullable: true
        canBeManagedViaAPI:
          description: Enables or disables the ability to assign the project/admin
            feature using the API.
          type: boolean
          example: true
          nullable: true
      type: object
    FileStorageCreateAbsRequest:
      required:
      - accountName
      - containerName
      - owner
      - accountKey
      - region
      properties:
        accountName:
          description: Azure Storage account name.
          type: string
          example: nameofaccount
        containerName:
          description: Azure Blob Storage container name.
          type: string
          example: name-of-container
        owner:
          description: Associated Azure account owner (typically `keboola` or `client-<name>`).
          type: string
          example: keboola
        accountKey:
          description: Azure Storage account access key.
          type: string
          example: TTASDASASDfasdf==
        region:
          description: Region in which the storage operates.
          type: string
          example: us-east-1
      type: object
    FileStorageRotateAbsRequest:
      type: object
    FileStorageCreateGcsRequest:
      required:
      - gcsCredentials
      - filesBucket
      - owner
      - region
      properties:
        gcsCredentials:
          description: GCP service account key file contents (full JSON keyfile including
            the private key).
          required:
          - type
          - project_id
          - private_key_id
          - private_key
          - client_email
          - client_id
          - auth_uri
          - token_uri
          - auth_provider_x509_cert_url
          - client_x509_cert_url
          properties:
            type:
              type: string
              example: service_account
            project_id:
              type: string
              example: '123456789'
            private_key_id:
              type: string
              example: xxx
            private_key:
              type: string
              example: '-----BEGIN PRIVATE KEY-----<key contents>-----END PRIVATE
                KEY-----

                '
            client_email:
              type: string
              example: something@else.iam.gserviceaccount.com
            client_id:
              type: string
              example: '123456789'
            auth_uri:
              type: string
              example: https://accounts.google.com/o/oauth2/auth
            token_uri:
              type: string
              example: https://oauth2.googleapis.com/token
            auth_provider_x509_cert_url:
              type: string
              example: https://www.googleapis.com/oauth2/v1/certs
            client_x509_cert_url:
              type: string
              example: https://www.googleapis.com/robot/v1/metadata/x509/something
          type: object
          example:
            type: service_account
            project_id: '123456789'
            private_key_id: xxx
            private_key: '-----BEGIN PRIVATE KEY-----<key contents>-----END PRIVATE
              KEY-----\n'
            client_email: something@else.iam.gserviceaccount.com
            client_id: '123456789'
            auth_uri: https://accounts.google.com/o/oauth2/auth
            token_uri: https://oauth2.googleapis.com/token
            auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
            client_x509_cert_url: https://www.googleapis.com/robot/v1/metadata/x509/something
        filesBucket:
          description: Name of the Google Cloud Storage bucket.
          type: string
          example: my-bucket
        owner:
          description: Associated GCP account owner.
          type: string
          example: keboola
          enum:
          - keboola
          - client
        region:
          description: Region in which the storage operates.
          type: string
          example: europe-west1
      type: object
    FileStorageRotateGcsRequest:
      type: object
    FileStorageCreateS3Request:
      required:
