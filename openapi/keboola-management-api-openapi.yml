        attribute is set to `true`),

        all members of the organization, its maintainers and superadmins are allowed
        to join the project.

        Otherwise only members of the organization can join the project.


        An optional expiration (in seconds) and reason for joining can be added to
        the request.'
      operationId: post_/manage/projects/{projectId}/join-project::ProjectJoinAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the project.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 4088
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                reason:
                  description: Reason for joining the project.
                  type: string
                  example: temporary test
                expirationSeconds:
                  description: The number of seconds until the user's membership expires.
                  type: integer
                  example: 3600
              type: object
            example:
              reason: temporary test
              expirationSeconds: 3600
      responses:
        '204':
