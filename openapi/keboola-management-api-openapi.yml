        user:
          description: User tied to the token. Only present when the token is associated
            with an admin user; absent (or `null` in clients that materialise missing
            keys) otherwise.
          required:
          - id
          - name
          - email
          - mfaEnabled
          - features
          - canAccessLogs
          - isSuperAdmin
          properties:
            id:
              type: integer
              example: 7919
            name:
              type: string
              example: John Doe
            email:
              type: string
              example: john.doe@keboola.com
            mfaEnabled:
              type: boolean
              example: true
            features:
              type: array
              items:
                type: string
              example: []
            canAccessLogs:
              type: boolean
              example: true
            isSuperAdmin:
              type: boolean
              example: true
          type: object
          nullable: true
      type: object
      example:
        id: 13702
        description: Example token
        created: 2021-06-28T22:27:28+0200
        lastUsed: 2022-06-13T22:29:03+0200
        expires: 2031-06-26T22:27:28+0200
        isSessionToken: false
        isExpired: false
        isDisabled: false
        scopes: []
        type: admin
        creator:
          id: 7919
          name: John Doe
        user:
          id: 7919
          name: John Doe
          email: john.doe@keboola.com
          mfaEnabled: true
          features: []
          canAccessLogs: true
          isSuperAdmin: true
    UiAppResponse:
      required:
      - name
      - version
      - basePath
      - type
      - scripts
      - styles
      - isCritical
      properties:
        name:
          description: Application name.
          type: string
        version:
          description: Active version identifier.
          type: string
        basePath:
          description: Base path for the UI application.
          type: string
        type:
          description: Application script MIME type.
          type: string
        scripts:
          description: List of script URLs.
          type: array
          items:
            type: string
        styles:
          description: List of style URLs.
          type: array
          items:
            type: string
        isCritical:
          description: Whether the application is marked as critical.
          type: boolean
        commitSha:
          description: Git commit SHA that produced this build.
          type: string
          nullable: true
      type: object
    UiAppsListResponse:
      type: array
      items:
        $ref: '#/components/schemas/UiAppResponse'
    UiAppsRegistrationResponse:
      required:
      - app
      - version
      properties:
        app:
          properties:
            id:
              description: Application identifier.
              type: string
            stringId:
              description: Unique application string identifier.
              type: string
            name:
              description: Application name.
              type: string
            created:
              description: Application creation time. Formatted as `YYYY-MM-DD HH:MM:SS`
                (no timezone).
              type: string
              example: '2024-04-21 13:42:11'
          type: object
        version:
          properties:
            id:
              description: Version identifier.
              type: string
            version:
              description: Version number.
              type: string
            isActive:
              description: Flag indicating whether the version is active.
              type: boolean
            isCritical:
              description: Whether the version is marked as critical.
              type: boolean
            commitSha:
              description: Git commit SHA that produced this build.
              type: string
              nullable: true
          type: object
      type: object
  securitySchemes:
    StorageKey:
      type: apiKey
      name: X-StorageApi-Token
      in: header
    ManageKey:
      type: apiKey
      name: X-KBC-ManageApiToken
      in: header
    BearerAuth:
      type: http
      bearerFormat: Access Token (kbc_at_...)
      scheme: bearer
security:
- StorageKey: []
- ManageKey: []
- BearerAuth: []
tags:
- name: Token Verification
  description: Inspect the manage token used for the request.
- name: Maintainers
  description: Manage maintainer records, their members and invitations.
- name: Organizations
  description: Manage organizations, their members and invitations.
- name: Projects
  description: Manage projects, project members, invitations, join requests and per-project
    settings.
- name: Deleted Projects
  description: Inspect and purge soft-deleted projects.
- name: Users
  description: Manage Keboola users by super admins.
- name: My Account
  description: Endpoints scoped to the current user — invitations, join requests and
    session tokens.
- name: SUPER - Features
  description: Manage feature flags and assign features to projects, users or organizations.
- name: SUPER - File Storage Management
  description: Manage S3, GCS and ABS file storage backends and their credentials.
- name: SUPER - Storage Backends Management
  description: Manage Snowflake, BigQuery and other storage backends used by projects.
- name: SUPER - Commands
  description: Run Keboola Connection CLI commands asynchronously via the commands
    queue.
- name: SUPER - UI Management
  description: Manage UI applications and their deployed versions.
- name: SUPER - Kubernetes
  description: Read-only access to Kubernetes service accounts discovered in the stack.
- name: Internal
