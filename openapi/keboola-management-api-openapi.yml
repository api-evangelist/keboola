                    `production`, `poc`, `demo` (default `production`).
                  type: string
                  example: demo
                  enum:
                  - production
                  - poc
                  - demo
                defaultBackend:
                  description: Project default backend (default `snowflake`).
                  type: string
                  example: snowflake
                dataRetentionTimeInDays:
                  description: Data retention in days for Time Travel.
                  type: integer
                  example: 7
