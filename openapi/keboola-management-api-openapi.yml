        required: true
        content:
          application/json:
            schema:
              required:
              - email
              properties:
                email:
                  description: Email of an invited user.
                  type: string
                  format: email
                  example: martin@keboola.com
                role:
                  description: Role assigned in the project (default `admin`).
                  type: string
                  example: admin
                  enum:
                  - admin
                  - guest
                  - readOnly
                  - share
                expirationSeconds:
                  description: After how many seconds the membership of a user will
                    expire.
                  type: integer
                  example: 3600
