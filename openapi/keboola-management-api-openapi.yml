        schema:
          type: integer
          pattern: '[0-9]+'
        example: 4088
      responses:
        '204':
          description: Project deleted successfully.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to delete
