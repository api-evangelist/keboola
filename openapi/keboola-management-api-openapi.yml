openapi: 3.0.0
info:
  title: Keboola Connection Management API
  description: 'The Keboola Connection Management API covers all tasks required for
    managing

    projects, plus super-admin features for controlling and monitoring Keboola Connection.


    ## Projects management

    * Create, modify and delete maintainers, organizations and projects

    * Move projects between organizations

    * Define project limits

    * Provision storage backends

    * Access project management activity log


    ## Projects monitoring

    * Monitoring of projects across organizations and maintainers


    ## Super user control and monitoring

    * UI release and deployment

    * Components management

    * Final project delete

    * Workers start/shutdown, etc.


    ## Authentication

    The API authenticates with a personal access token sent in the `X-KBC-ManageApiToken`

    header. Tokens can be created in

    [Account Settings](https://connection.keboola.com/admin/account/change-password)

    in Keboola Connection. A token is tied to an administrator and inherits that

    administrator''s permissions; when the administrator is disabled or deleted, all

    their tokens become invalid.


    ```

    curl -H "X-KBC-ManageApiToken: USER_TOKEN" https://connection.keboola.com/manage/tokens/verify

    ```


    ## Token types

    | Type  | Tied to a user | Token string visible only on create | Description |

    | ----- | -------------- | ----------------------------------- | ----------- |

    | user  | Yes            | Yes                                 | Full access to
    maintainers, organizations and projects the user can see. |

    | super | No             | Yes                                 | KBC management.
    Scopes such as `super_ui_deploy`, `super_monitoring` etc. can be limited per-token.
    |


    Legacy Apiary reference: see the

    [Manage API blueprint](https://github.com/keboola/connection/blob/master/Package/ManageApiPhpClient/apiary.apib)

    for the historical document this OpenAPI spec is migrating from.

    '
  version: '1.0'
servers:
- url: https://connection.keboola.com
  description: AWS US East
- url: https://connection.eu-central-1.keboola.com
  description: AWS EU Central
- url: https://connection.north-europe.azure.keboola.com
  description: Azure North Europe
- url: https://connection.east-us-2.azure.keboola-testing.com
  description: Azure Testing
paths:
  /manage/commands:
    post:
      tags:
      - SUPER - Commands
      summary: Run Command
      description: 'Executes a Keboola Connection CLI command asynchronously. The
        command is enqueued to the commands queue, `commandExecutionId` is returned.

        You can use this ID to search the command output in Papertrail logs.'
      operationId: post_/manage/commands::CommandEnqueueAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnqueueCommandRequest'
      responses:
        '200':
          description: Identifier of the enqueued command execution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueCommandResponse'
              example:
                commandExecutionId: 123-abcd
        '400':
          description: Returned when the request body fails validation (missing `command`,
            wrong types).
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the current admin is not a super admin.
  /manage/current-user/maintainers-invitations/{id}:
    get:
      tags:
      - My Account
      summary: My maintainer invitation detail
      description: Returns detail of the specified maintainer invitation addressed
        to the current user.
      operationId: get_/manage/current-user/maintainers-invitations/{id}::MaintainerInvitationDetailAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '200':
          description: Maintainer invitation detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintainerInvitationResponse'
              example:
                id: 113
                created: 2018-07-10T11:13:00+0200
                maintainer:
                  id: 7
                  name: Keboola CZ
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to view the
            invitation.
        '404':
          description: Returned when the invitation does not exist.
    put:
      tags:
      - My Account
      summary: Accept a maintainer invitation
      description: Invitation will be accepted and current user will become a member
        of the maintainer.
      operationId: put_/manage/current-user/maintainers-invitations/{id}::MaintainerInvitationAcceptAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '202':
          description: Invitation accepted successfully.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to accept
            the invitation.
        '404':
          description: Returned when the invitation does not exist.
    delete:
      tags:
      - My Account
      summary: Reject maintainer invitation
      description: Rejects the specified maintainer invitation for the current user.
      operationId: delete_/manage/current-user/maintainers-invitations/{id}::MaintainerInvitationRejectAction
      parameters:
      - name: id
        in: path
        description: Identifier of the invitation.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '204':
          description: Invitation rejected successfully.
        '403':
          description: Returned when the token does not have permission.
        '404':
          description: Returned when the invitation does not exist.
  /manage/current-user/maintainers-invitations:
    get:
      tags:
      - My Account
      summary: List my maintainer invitations
      description: Returns a list of maintainer invitations addressed to the current
        user.
      operationId: get_/manage/current-user/maintainers-invitations::MaintainerInvitationListAction
      responses:
        '200':
          description: List of maintainer invitations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaintainerInvitationResponse'
              example:
              - id: 113
                created: 2018-07-10T11:13:00+0200
                maintainer:
                  id: 7
                  name: Keboola CZ
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to list invitations.
  /manage/current-user/organizations-invitations/{id}:
    get:
      tags:
      - My Account
      summary: My organization invitation detail
      description: Returns detail of the specified organization invitation addressed
        to the current user.
      operationId: get_/manage/current-user/organizations-invitations/{id}::OrganizationInvitationDetailAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '200':
          description: Organization invitation detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInvitationResponse'
              example:
                id: 113
                created: 2018-07-10T11:13:00+0200
                organization:
                  id: 7
                  name: Keboola CZ
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to view the
            invitation.
        '404':
          description: Returned when the invitation does not exist.
    put:
      tags:
      - My Account
      summary: Accept an organization invitation
      description: Invitation will be accepted and current user will become a member
        of the organization.
      operationId: put_/manage/current-user/organizations-invitations/{id}::OrganizationInvitationAcceptAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '202':
          description: Invitation accepted successfully.
        '400':
          description: Returned when the organization requires MFA and the current
            user does not have MFA enabled.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to accept
            the invitation.
        '404':
          description: Returned when the invitation does not exist.
    delete:
      tags:
      - My Account
      summary: Reject organization invitation
      description: Rejects the specified organization invitation for the current user.
      operationId: delete_/manage/current-user/organizations-invitations/{id}::OrganizationInvitationRejectAction
      parameters:
      - name: id
        in: path
        description: Identifier of the invitation.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '204':
          description: Invitation rejected successfully.
        '403':
          description: Returned when the token does not have permission.
        '404':
          description: Returned when the invitation does not exist.
  /manage/current-user/organizations-invitations:
    get:
      tags:
      - My Account
      summary: List my organization invitations
      description: Returns a list of organization invitations addressed to the current
        user.
      operationId: get_/manage/current-user/organizations-invitations::OrganizationInvitationListAction
      responses:
        '200':
          description: List of organization invitations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationInvitationResponse'
              example:
              - id: 113
                created: 2018-07-10T11:13:00+0200
                organization:
                  id: 7
                  name: Keboola CZ
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to list invitations.
  /manage/current-user/projects-invitations/{id}:
    get:
      tags:
      - My Account
      summary: My project invitation detail
      description: Returns detail of the specified project invitation addressed to
        the current user.
      operationId: get_/manage/current-user/projects-invitations/{id}::ProjectInvitationDetailAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '200':
          description: Project invitation detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectInvitationResponse'
              example:
                id: 113
                created: 2018-07-10T11:13:00+0200
                expires: null
                reason: ''
                role: admin
                project:
                  id: 7
                  name: Martinovo
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to view the
            invitation.
        '404':
          description: Returned when the invitation does not exist.
    put:
      tags:
      - My Account
      summary: Accept a project invitation
      description: Invitation will be accepted and current user will be added to the
        project.
      operationId: put_/manage/current-user/projects-invitations/{id}::ProjectInvitationAcceptAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '202':
          description: Invitation accepted successfully.
        '400':
          description: Returned when the project requires MFA and the current user
            does not have MFA enabled.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to accept
            the invitation.
        '404':
          description: Returned when the invitation does not exist.
    delete:
      tags:
      - My Account
      summary: Decline a invitation
      description: Declines the specified project invitation addressed to the current
        user.
      operationId: delete_/manage/current-user/projects-invitations/{id}::ProjectInvitationRejectAction
      parameters:
      - name: id
        in: path
        description: Invitation identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 113
      responses:
        '204':
          description: Invitation declined successfully.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to decline
            the invitation.
        '404':
          description: Returned when the invitation does not exist.
  /manage/current-user/projects-invitations:
    get:
      tags:
      - My Account
      summary: List my project invitations
      description: Returns a list of project invitations addressed to the current
        user.
      operationId: get_/manage/current-user/projects-invitations::ProjectInvitationListAction
      responses:
        '200':
          description: List of project invitations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectInvitationResponse'
              example:
              - id: 113
                created: 2018-07-10T11:13:00+0200
                expires: null
                reason: ''
                role: admin
                project:
                  id: 7
                  name: Martinovo
                creator:
                  id: 2
                  name: Martin Halamicek
                  email: martin@keboola.com
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to list invitations.
  /manage/current-user/projects-join-requests/{id}:
    get:
      tags:
      - My Account
      summary: My join request detail
      description: Returns detail of the specified project join request submitted
        by the current user.
      operationId: get_/manage/current-user/projects-join-requests/{id}::ProjectJoinRequestDetailAction
      parameters:
      - name: id
        in: path
        description: Join request identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 124
      responses:
        '200':
          description: Project join request detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectJoinRequestResponse'
              example:
                id: 124
                created: 2016-02-22T15:01:13+0200
                expires: 2016-03-22T15:01:13+0200
                reason: temporary test
                project:
                  id: 324
                  name: Main project
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to view the
            join request.
        '404':
          description: Returned when the join request does not exist.
    delete:
      tags:
      - My Account
      summary: Cancel a join request
      description: Cancels the specified project join request submitted by the current
        user.
      operationId: delete_/manage/current-user/projects-join-requests/{id}::ProjectJoinRequestCancelAction
      parameters:
      - name: id
        in: path
        description: Join request identifier.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 124
      responses:
        '204':
          description: Join request cancelled successfully.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to cancel
            the join request.
        '404':
          description: Returned when the join request does not exist.
  /manage/current-user/projects-join-requests:
    get:
      tags:
      - My Account
      summary: List my join requests
      description: Returns a list of project join requests submitted by the current
        user.
      operationId: get_/manage/current-user/projects-join-requests::ProjectJoinRequestListAction
      responses:
        '200':
          description: List of project join requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectJoinRequestResponse'
              example:
              - id: 124
                created: 2016-02-22T15:01:13+0200
                expires: 2016-03-22T15:01:13+0200
                reason: temporary test
                project:
                  id: 324
                  name: Main project
              - id: 127
                created: '2014-11-11T08:40:51+00:00'
                expires: null
                reason: ''
                project:
                  id: 423
                  name: Development
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to list join
            requests.
  /manage/current-user/session-token:
    post:
      tags:
      - My Account
      summary: Create session token
      description: Creates a session token for the current user.
      operationId: post_/manage/current-user/session-token::SessionTokenCreateAction
      responses:
        '201':
          description: Session token created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTokenResponse'
        '403':
          description: Returned when the token does not have permission.
  /manage/deleted-projects/{projectId}:
    get:
      tags:
      - Deleted Projects
      summary: Deleted project detail
      description: 'Returns detailed information about a project scheduled for deletion.


        This endpoint can also be accessed using application tokens with scope `deleted-projects:read`
        or user token with feature `can-manage-deleted-projects`.'
      operationId: get_/manage/deleted-projects/{projectId}::DeletedProjectDetailAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the deleted project.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 101
      responses:
        '200':
          description: Deleted project detail response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedProjectResponse'
              example:
                id: 101
                name: test project
                type: production
                region: eu-west-1
                created: 2017-02-15T14:25:15+0100
                expires: null
                features: []
                dataSizeBytes: 49152
                rowsCount: 200
                hasMysql: false
                hasSynapse: false
                hasExasol: false
                hasTeradata: false
                hasSnowflake: true
                defaultBackend: snowflake
                hasTryModeOn: '0'
                limits: {}
                metrics: {}
                isDisabled: false
                billedMonthlyPrice: null
                dataRetentionTimeInDays: 1
                isPurged: false
                isDeleted: true
                deletedTime: 2018-02-11T14:25:15+0100
                purgedTime: null
                isBYODB: false
        '400':
          description: Returned when the project is not deleted or was permanently
            removed.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to view the
            deleted project.
        '404':
          description: Returned when the project does not exist.
    delete:
      tags:
      - Deleted Projects
      summary: Cancel project deletion
      description: 'Cancelling project deletion is allowed only for a super admin
        or user with feature `can-manage-deleted-projects`.

        If the project has set expiration, the expiration is reset on the project
        renewal.

        You can also specify new expiration by `expirationDays` parameter.'
      operationId: delete_/manage/deleted-projects/{projectId}::ProjectDeletionCancelAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the deleted project.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 101
      - name: expirationDays
        in: query
        description: Project expiration in days.
        required: false
        schema:
          type: integer
        example: 30
      responses:
        '204':
          description: Deletion canceled successfully.
        '400':
          description: Returned when the project is not deleted or was permanently
            removed.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to cancel
            project deletion.
        '404':
          description: Returned when the project does not exist.
  /manage/deleted-projects:
    get:
      tags:
      - Deleted Projects
      summary: List deleted projects
      description: 'Listing deleted projects is allowed only for a super admin or
        user with feature `can-manage-deleted-projects`.


        #### Projects filtering


        Projects can be filtered by various filters:


        * *organizationId* - organization ID

        * *name* - name of the project


        #### Projects pagination


        * *limit* - number of returned projects; default value: 100

        * *offset* - pagination offset'
      operationId: get_/manage/deleted-projects::DeletedProjectsListAction
      parameters:
      - name: limit
        in: query
        description: 'Number of returned projects. Default value: 100.'
        required: false
        schema:
          type: integer
        example: 100
      - name: offset
        in: query
        description: Pagination offset.
        required: false
        schema:
          type: integer
        example: 0
      - name: organizationId
        in: query
        description: Filter projects by organization identifier.
        required: false
        schema:
          type: integer
        example: 1
      - name: name
        in: query
        description: Filter projects by name.
        required: false
        schema:
          type: string
        example: test project
      responses:
        '200':
          description: Deleted projects list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedProjectsListResponse'
              example:
              - id: 101
                name: test project
                type: production
                region: eu-west-1
                created: 2017-02-15T14:25:15+0100
                expires: null
                features: []
                dataSizeBytes: 49152
                rowsCount: 200
                hasMysql: false
                hasSnowflake: true
                hasSynapse: false
                hasTeradata: false
                hasExasol: false
                defaultBackend: snowflake
                hasTryModeOn: '0'
                limits: {}
                metrics: {}
                isDisabled: false
                billedMonthlyPrice: null
                dataRetentionTimeInDays: 7
                isBYODB: false
                isPurged: false
                isDeleted: true
                deletedTime: 2018-02-11T14:25:15+0100
                purgedTime: null
                organization:
                  id: 1
                  name: Keboola Tests
                  created: ''
                  allowAutoJoin: true
              - id: 104
                name: another test project
                type: production
                region: eu-west-1
                created: 2017-02-15T14:25:15+0100
                expires: null
                features: []
                dataSizeBytes: 49152
                rowsCount: 200
                hasMysql: false
                hasSnowflake: true
                hasSynapse: false
                hasTeradata: false
                hasExasol: false
                defaultBackend: snowflake
                hasTryModeOn: '0'
                limits: {}
                metrics: {}
                isDisabled: false
                billedMonthlyPrice: null
                dataRetentionTimeInDays: 7
                isBYODB: false
                isPurged: false
                isDeleted: true
                deletedTime: 2018-02-11T14:25:15+0100
                purgedTime: null
                organization:
                  id: 1
                  name: Keboola Tests
                  created: ''
                  allowAutoJoin: true
        '400':
          description: Returned when the supplied organization is not found.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to list deleted
            projects.
  /manage/deleted-projects/{projectId}/purge:
    post:
      tags:
      - Deleted Projects
      summary: Purge deleted project
      description: Enqueues the command that fully deletes a project and returns its
        execution ID for monitoring.
      operationId: post_/manage/deleted-projects/{projectId}/purge::ProjectPurgeAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the deleted project to purge.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 101
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPurgeRequest'
            example:
              ignoreBackendErrors: false
      responses:
        '200':
          description: Identifier of the enqueued purge command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueCommandResponse'
              example:
                commandExecutionId: 123-abcd
        '400':
          description: Returned when the project is not deleted.
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to purge deleted
            projects.
        '404':
          description: Returned when the project does not exist.
  /manage/features/{id}/admins:
    get:
      tags:
      - SUPER - Features
      summary: Retrieve feature users
      description: Gets the users with the specified feature assigned.
      operationId: get_/manage/features/{id}/admins::FeatureAdminListAction
      parameters:
      - name: id
        in: path
        description: ID of the feature.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
        example: 1
      responses:
        '200':
          description: List of admins with the feature assigned.
          content:
            application/json:
              schema:
                type: array
                items:
                  properties:
                    id:
                      description: Admin identifier.
                      type: integer
                      example: 1
                    name:
                      description: Admin name.
                      type: string
                      example: Test user
                    email:
                      description: Admin email address.
                      type: string
