  /manage/projects/{projectId}/tokens:
    post:
      tags:
      - Projects
      summary: Create Storage token
      description: 'Requires the management token of an admin who is either superuser
        or has joined the

        project previously. Alternatively it can be called with an application token
        with

        scope `manage:storage-tokens`.


        The `canManageTokens` attribute is deprecated and will be ignored.'
      operationId: post_/manage/projects/{projectId}/tokens::ProjectCreateStorageTokenAction
      parameters:
      - name: projectId
        in: path
        description: Identifier of the project.
        required: true
        schema:
          type: integer
          pattern: '[0-9]+'
        example: 4088
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - description
              properties:
                description:
                  description: Token description.
                  type: string
                  example: Test Token
                canManageBuckets:
                  description: Token has full permissions on tabular storage.
                  type: boolean
                  example: true
                canManageTokens:
                  description: Deprecated and ignored — used to control token creation
                    permission inside the project.
                  type: boolean
                  example: false
                canReadAllFileUploads:
                  description: Token has full permissions to files staging.
                  type: boolean
                  example: true
                canPurgeTrash:
                  description: Allows permanently removing deleted configurations.
                  type: boolean
                  example: true
                expiresIn:
                  description: Token lifetime in seconds.
                  type: integer
                  example: 60
                bucketPermissions:
                  description: Bucket permissions keyed by bucket id (e.g. `read`,
                    `write`).
                  type: object
                  example:
                    in.c-main: read
                  additionalProperties:
                    type: string
                componentAccess:
                  description: Grants access for component configurations. Allowed
                    values are valid component IDs from https://components.keboola.com/components.
                  type: array
                  items:
                    type: string
              type: object
            example:
              description: Test Token
              canManageBuckets: true
              canReadAllFileUploads: true
              canPurgeTrash: true
              expiresIn: 60
              bucketPermissions:
                in.c-main: read
      responses:
        '201':
          description: Storage token created successfully.
          content:
            application/json:
              schema:
                description: Storage token with permissions.
                properties:
                  id:
                    type: integer
                    example: 3846
                  token:
                    type: string
                    example: TOKEN_VALUE
                  created:
                    type: string
                    format: date-time
                    example: '2013-03-28T13:31:50+01:00'
                  description:
                    type: string
                    example: martin@keboola.com
                  uri:
                    type: string
                    example: https://connection.keboola.com/v2/storage/tokens/3846
                  isMasterToken:
                    type: boolean
                    example: true
                  canManageBuckets:
                    type: boolean
                    example: true
                  canManageTokens:
                    type: boolean
                    example: true
                  canReadAllFileUploads:
                    type: boolean
                    example: true
                  canPurgeTrash:
                    type: boolean
                    example: true
                  expires:
                    type: string
                    format: date-time
                    example: null
                    nullable: true
                  isExpired:
                    type: boolean
                    example: false
                  isDisabled:
                    type: boolean
                    example: false
                  dailyCapacity:
                    type: integer
                    example: 0
                  bucketPermissions:
                    type: object
                type: object
              example:
                id: 3846
                token: TOKEN_VALUE
                created: '2013-03-28T13:31:50+01:00'
                description: martin@keboola.com
                uri: https://connection.keboola.com/v2/storage/tokens/3846
                isMasterToken: true
                canManageBuckets: true
                canManageTokens: true
                canReadAllFileUploads: true
                canPurgeTrash: true
                expires: null
                isExpired: false
                isDisabled: false
                dailyCapacity: 0
                bucketPermissions: {}
        '400':
          description: Returned when the token creation parameters are invalid (e.g.
            invalid bucket permissions or malformed body).
        '401':
          description: Returned when the Manage token is missing or invalid.
        '403':
          description: Returned when the token does not have permission to create
            storage tokens (application token missing `manage:storage-tokens` scope
            or admin not a project member).
        '404':
          description: Returned when the project does not exist.
  /manage/projects/{projectId}:
