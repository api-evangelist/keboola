      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          pattern: '[0-9]+'
      responses:
        '200':
          description: Row version detail
        '404':
          description: Component, configuration, row or version not found
  /v2/storage/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}:
    get:
      tags:
