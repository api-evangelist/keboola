  ? /v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}/rollback
  : post:
      tags:
      - Component Configuration Row Versions
      summary: Rollback row version
      description: Rollback a configuration row to a specific version.
      operationId: post_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}/rollback::RowVersionRollbackAction
