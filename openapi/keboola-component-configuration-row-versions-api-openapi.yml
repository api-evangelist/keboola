tags:
- name: Component Configuration Row Versions
paths:
  /v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}/create:
    post:
      tags:
      - Component Configuration Row Versions
      summary: Create row version copy
      description: Create a named copy of a specific configuration row version.
      operationId: post_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}/create::RowVersionCreateAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          pattern: '[0-9]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CreateConfigurationRowVersionRequest'
      responses:
        '201':
          description: Row version copy created
        '404':
          description: Component or configuration not found
  /v2/storage/components/{componentId}/configs/{configurationId}/rows/{rowId}/versions/{versionId}/create:
    post:
      tags:
      - Component Configuration Row Versions
      summary: Create row version copy
