openapi: 3.0.0
info:
  title: AI Service Actions Component Configuration Rows API
  version: 1.0.0
  contact:
    email: devel@keboola.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
- name: Component Configuration Rows
paths:
  /v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows:
    get:
      tags:
      - Component Configuration Rows
      summary: List configuration rows
      description: List all rows in a component configuration.
      operationId: get_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows::ConfigurationRowListAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      responses:
        '200':
          description: List of rows
        '404':
          description: Component or configuration not found
    post:
      tags:
      - Component Configuration Rows
      summary: Create configuration row
      description: Create a new row in a component configuration.
      operationId: post_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows::ConfigurationRowCreateAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CreateConfigurationRowRequest'
      responses:
        '201':
          description: Row created
        '404':
          description: Component or configuration not found
        '409':
          description: Version conflict
  /v2/storage/components/{componentId}/configs/{configurationId}/rows:
    get:
      tags:
      - Component Configuration Rows
      summary: List configuration rows
      description: List all rows in a component configuration.
      operationId: get_/v2/storage/components/{componentId}/configs/{configurationId}/rows::ConfigurationRowListAction
      parameters:
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      responses:
        '200':
          description: List of rows
        '404':
          description: Component or configuration not found
    post:
      tags:
      - Component Configuration Rows
      summary: Create configuration row
      description: Create a new row in a component configuration.
      operationId: post_/v2/storage/components/{componentId}/configs/{configurationId}/rows::ConfigurationRowCreateAction
      parameters:
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/CreateConfigurationRowRequest'
      responses:
        '201':
          description: Row created
        '404':
          description: Component or configuration not found
        '409':
          description: Version conflict
  /v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}:
    get:
      tags:
      - Component Configuration Rows
      summary: Get configuration row detail
      description: Retrieve details of a specific configuration row.
      operationId: get_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}::ConfigurationRowDetailAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      responses:
        '200':
          description: Row detail
        '404':
          description: Component, configuration or row not found
    put:
      tags:
      - Component Configuration Rows
      summary: Update configuration row
      description: Update an existing configuration row.
      operationId: put_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}::ConfigurationRowUpdateAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/UpdateConfigurationRowRequest'
      responses:
        '200':
          description: Row updated
        '404':
          description: Component, configuration or row not found
        '409':
          description: Version conflict
    delete:
      tags:
      - Component Configuration Rows
      summary: Delete configuration row
      description: Delete a configuration row.
      operationId: delete_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}::ConfigurationRowDeleteAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/DeleteConfigurationRowRequest'
      responses:
        '204':
          description: Row deleted
        '404':
          description: Component, configuration or row not found
  /v2/storage/components/{componentId}/configs/{configurationId}/rows/{rowId}:
    get:
      tags:
      - Component Configuration Rows
      summary: Get configuration row detail
