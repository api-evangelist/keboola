          type: string
          nullable: true
        database:
          description: Database name.
          type: string
          nullable: true
        useSynapseManagedIdentity:
          description: Flag for Synapse managed identity.
          type: boolean
          nullable: true
        saml2Configuration:
          description: SAML2 configuration for the backend.
          properties:
            idpEntityId:
              type: string
            spEntityId:
              type: string
            spAcsUrl:
              type: string
            publicKey:
              type: string
          type: object
          nullable: true
        useDynamicBackends:
          description: Flag for Snowflake dynamic backends.
          type: boolean
        useSso:
          description: Deprecated; use isSsoEnabled. Snowflake SSO flag.
