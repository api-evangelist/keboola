          type: string
        region:
          description: Backend region.
          type: string
        owner:
          description: 'Associated legal owner (mostly: keboola, client-<name>).'
          type: string
        technicalOwner:
          description: 'Associated technical owner (who technically manages the account). One of: keboola, internal, kbdb, byodb.'
