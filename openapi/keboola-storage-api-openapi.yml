      - Files
      summary: Delete a file
      description: "Deletes a file synchronously or asynchronously.\n\nInitial response\
        \ returns job details [JobResponse](#model-JobResponse). The result of the\
        \ asynchronous job can be fetched via `/v2/storage/jobs/{id}`. When the job\
        \ completes, final result is [FileDeleteResponse](#model-FileDeleteResponse).\n\
        \n Parameters of job will be [FileDeleteJobParams](#components-schemas-FileDeleteJobParams).\n\
        \n[Deprecated] This endpoint can be used synchronously as well."
      operationId: delete_/v2/storage/branch/{branchId}/files/{fileId}::FileDeleteAction
      parameters:
      - name: fileId
        in: path
        description: Identifier of the file.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: async
        in: query
        description: When true, deletion is processed asynchronously. Setting async=false
          is deprecated.
        required: false
        schema:
          type: boolean
          default: false
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: File successfully deleted.
        '404':
          description: Returned when the file does not exist.
        '202':
          description: Job accepted; returns job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          x-storage-job-result:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
      x-storage-job-result:
        application/json:
          schema:
            $ref: '#/components/schemas/FileDeleteResponse'
