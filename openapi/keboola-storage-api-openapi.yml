  /v2/storage/branch/{branchId}/tables/{tableId}/definition:
    put:
      tags:
      - Tables
      summary: Update table definition
      description: "Updates table and column definition metadata. Async-only - returns\
        \ 202 with a storage job; poll it for completion. Backend DDL changes are\
        \ not atomic across multiple column operations. If the async job fails after\
        \ applying some changes, previously applied changes may remain applied. Re-read\
        \ the table definition before retrying.\n\nInitial response returns job details\
        \ [JobResponse](#model-JobResponse). The result of the asynchronous job can\
        \ be fetched via `/v2/storage/jobs/{id}`. When the job completes, final result\
        \ is [TableCreateResponse](#model-TableCreateResponse).\n\n Parameters of\
        \ job will be [TableDefinitionUpdateJobParams](#components-schemas-TableDefinitionUpdateJobParams)."
      operationId: put_/v2/storage/branch/{branchId}/tables/{tableId}/definition::TableDefinitionUpdateAction
      parameters:
      - name: tableId
        in: path
        description: Table string id (e.g. `in.c-main.orders`).
        required: true
        schema:
          type: string
          pattern: .+
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: X-KBC-Backend
        in: header
        schema:
          schema: BackendConfigurationRequest
          properties:
            context:
              type: string
              nullable: true
              minLength: 1
          type: object
      responses:
        '404':
          description: Either table, bucket, or column was not found.
        '400':
          description: The request does not contain any effective definition changes.
        '403':
          description: Access to the table was denied.
        '422':
          description: The backend does not support table definition updates.
        '202':
          description: Job accepted; returns job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          x-storage-job-result:
            application/json:
              schema:
                $ref: '#/components/schemas/TableCreateResponse'
      x-storage-job-result:
        application/json:
          schema:
            $ref: '#/components/schemas/TableCreateResponse'
      x-storage-job-params:
        application/json:
          schema:
            $ref: '#/components/schemas/TableDefinitionUpdateJobParams'
