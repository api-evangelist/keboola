  /v2/storage/branch/{branchId}/tables/{tableId}/swap:
    post:
      tags:
      - Tables
      summary: Swap two tables
      description: "Exchanges the physical storage of two tables in the same bucket.\
        \ Async-only — returns 202 with a storage job; poll it for completion. Aliases\
        \ are not transferred with table identity: each alias keeps pointing at the\
        \ same physical position, so after the swap aliases expose the data of the\
        \ other table. Both tables must live in the same bucket on the same backend\
        \ connection.\n\nInitial response returns job details [JobResponse](#model-JobResponse).\
        \ The result of the asynchronous job can be fetched via `/v2/storage/jobs/{id}`.\
        \ When the job completes, final result is [TableSwapResult](#model-TableSwapResult).\n\
        \n Parameters of job will be [SwapJobParams](#components-schemas-SwapJobParams)."
      operationId: post_/v2/storage/branch/{branchId}/tables/{tableId}/swap::TableSwapAction
      parameters:
      - name: tableId
        in: path
        description: Source table string id (e.g. `in.c-main.orders`).
        required: true
        schema:
          type: string
          pattern: .+
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/TableSwapRequest'
      responses:
        '400':
          description: Validation error in the request payload, or the backend does
            not support swap (`storage.driver.unsupportedOperation`).
        '404':
          description: Either table or its bucket was not found.
        '403':
          description: Access to one of the tables was denied.
        '422':
          description: 'Operation not applicable: source and target are the same table
            (`storage.tables.sameTableSwap`), either side is an alias (`storage.tables.cannotSwapAlias`),
            or the tables live in different buckets (`storage.tables.crossBucketSwap`).'
        '202':
          description: Job accepted; returns job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          x-storage-job-result:
            application/json:
              schema:
                $ref: '#/components/schemas/TableSwapResult'
      x-storage-job-result:
        application/json:
          schema:
            $ref: '#/components/schemas/TableSwapResult'
      x-storage-job-params:
        application/json:
          schema:
            $ref: '#/components/schemas/SwapJobParams'
