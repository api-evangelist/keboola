components:
  schemas:
    BucketRegisterGuideRequest:
      required:
      - path
      - backend
      properties:
        path:
          description: Path to the bucket.
          type: array
          items:
            type: string
            minLength: 1
        backend:
          description: Desired backend of the bucket.
          type: string
          enum:
          - snowflake
          - bigquery
