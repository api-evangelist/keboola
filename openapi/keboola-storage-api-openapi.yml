  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/input-mapping-load:
    post:
      tags:
      - Workspaces
      summary: Load tables into a workspace using an input-mapping config
      description: Accepts a component-style input-mapping configuration and either
        returns the resolved load types (dryRun=true) or creates a workspace-load
        job (dryRun=false, default).
      operationId: post_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/input-mapping-load::WorkspaceInputMappingLoadAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the target workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: dryRun
        in: query
        description: If `true`, do not create a job — return resolved load types per
          table instead.
        required: false
        schema:
          type: boolean
          default: false
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: X-KBC-Backend
        in: header
        schema:
          schema: BackendConfigurationRequest
          properties:
            context:
              type: string
              nullable: true
              minLength: 1
          type: object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputMappingLoadRequest'
      responses:
        '200':
          description: 'Dry-run: validates the payload exactly as the real load would
            and returns the resolved load types per input table. A successful 200
            response means the same payload submitted with dryRun=false will not be
            rejected by validation (modulo source state changing).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputMappingLoadDryRunResponse'
        '202':
          description: Workspace-load job accepted (dryRun=false).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '400':
          description: Invalid request — validation error, unsupported option, or
            duplicate destination.
        '403':
          description: Caller does not have access to the requested source table.
        '404':
          description: Workspace, source bucket, or source table not found.
        '422':
          description: Unsupported workspace backend for the requested load.
