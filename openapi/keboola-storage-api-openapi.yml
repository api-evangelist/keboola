        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/MetadataCreateRequest'
      responses:
        '201':
          description: Metadata successfully created or updated.
          content:
            application/json:
              schema:
                type: array
                items:
                  required:
                  - id
