  /v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/diff:
    get:
      tags:
      - Component Configuration Rows
      summary: Get configuration row three-way diff
      description: Returns the "base" (dev branch version 1), "ours" (dev branch head)
        and "theirs" (default branch head) versions of a single configuration row,
        so a client can render a three-way diff for conflict resolution. Each side
        is null when the row does not exist on that side. When there is no conflict
        all three sides are equal. Only available in dev branches.
      operationId: get_/v2/storage/branch/{branchId}/components/{componentId}/configs/{configurationId}/rows/{rowId}/diff::ConfigurationRowDiffAction
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: componentId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: configurationId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
          pattern: '[^/]+'
      responses:
        '200':
          description: Three-way diff of the configuration row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationRowDiffResponse'
        '404':
          description: Component not found, or row absent in both branches
        '400':
          description: Called on the default branch — diff is only available in dev
            branches
