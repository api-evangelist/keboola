  /v2/storage/branch/{branchId}/events:
    get:
      tags:
      - Events
      summary: List events
      description: Lists events for the current project. For admin or master tokens,
        returns the full project feed. For other tokens, returns only events visible
        to that token.
      operationId: get_/v2/storage/branch/{branchId}/events::EventsListAction
      parameters:
      - name: limit
        in: query
        description: Maximum number of events to return
        required: false
        schema:
          type: integer
