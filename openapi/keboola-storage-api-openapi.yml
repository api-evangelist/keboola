components:
  schemas:
    ScheduleRefreshRequest:
      type: object
    ListFilesRequest:
      type: object
    BackendConfigurationRequest:
      properties:
        context:
          type: string
          nullable: true
          minLength: 1
      type: object
    ImportDataAsyncFromFileRequest:
      required:
      - dataFileId
      - treatValuesAsNull
      - columns
      - enclosure
      - delimiter
      - escapedBy
      properties:
        dataFileId:
          type: integer
        incremental:
          type: boolean
          default: false
        withoutHeaders:
          type: boolean
          default: false
        treatValuesAsNull:
          type: array
          items:
            type: string
            maxLength: 1
            minLength: 0
        columns:
          type: array
          items:
            type: string
        ignoredLinesCount:
          type: integer
          default: 0
        enclosure:
          type: string
        delimiter:
          type: string
        escapedBy:
          type: string
      type: object
    ImportDataAsyncFromWorkspaceRequest:
      required:
      - dataWorkspaceId
      - dataObject
      - dataTableName
      - columns
      - enclosure
      - delimiter
      - escapedBy
      - deduplicationStrategy
      properties:
        dataWorkspaceId:
          type: integer
        dataObject:
          type: string
        dataTableName:
          type: string
          deprecated: true
        incremental:
          type: boolean
          default: false
        withoutHeaders:
          type: boolean
          default: false
        columns:
          type: array
          items:
            type: string
        enclosure:
          type: string
        delimiter:
          type: string
        escapedBy:
          type: string
        deduplicationStrategy:
          type: string
          enum:
          - insert
          - upsert
      type: object
    CreateTagRequest:
      type: object
    UpdateDevBranchRequest:
      type: object
    CloneLoadRequest:
      type: object
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-StorageApi-Token
