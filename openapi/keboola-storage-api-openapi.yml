        files up to 10 MB are supported. Both encrypted and unencrypted files are
        supported. Files exceeding the size limit are rejected with 400.
      operationId: get_/v2/storage/branch/{branchId}/files/{fileId}/content::FileContentAction
      parameters:
      - name: fileId
        in: path
        description: Identifier of the file.
        required: true
        schema:
          type: integer
          pattern: \d+
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Raw file content with the appropriate Content-Type.
        '400':
          description: Returned when the file is sliced or exceeds the 10 MB size
            limit.
        '404':
          description: Returned when the file does not exist.
        '502':
          description: Returned when the storage backend is unreachable or returned
            an error.
