components:
  schemas:
    BucketListingCreateJobResult:
      required:
      - idBucket
      - listingId
      - listingResourceName
      - providerResourceName
      properties:
        idBucket:
          description: Identifier of the bucket the listing was created on.
          type: integer
        listingId:
          description: User-defined listing ID, unique within the project exchange.
          type: string
        listingResourceName:
          description: Fully-qualified GCP Analytics Hub listing resource name.
          type: string
        providerResourceName:
          description: Fully-qualified GCP Analytics Hub data exchange resource name.
          type: string
      type: object
    RefreshJobParams:
      required:
      - bucketId
      - jobOperationParams
      - jobParams
      properties:
        bucketId:
          type: integer
        jobOperationParams:
          type: array
          items: {}
        jobParams:
          type: array
          items: {}
      type: object
    CreateTableAsyncFromTimeTravelRequest:
      description: Request body for creating a table from a time travel source. Some parameters are optional or only used for specific backends.
      required:
      - sourceTableId
      - name
      - timestamp
      - primaryKey
      - distributionKey
      properties:
        sourceTableId:
          description: ID of the source table for time travel.
          type: string
        name:
          description: Name of the new table.
          type: string
        timestamp:
          description: Timestamp for time travel (ISO8601 or unix timestamp).
          type: string
        delimiter:
          description: CSV delimiter character.
          type: string
          nullable: true
        enclosure:
          description: CSV enclosure character.
          type: string
          nullable: true
        escapedBy:
          description: CSV escape character.
          type: string
          nullable: true
        primaryKey:
          description: Primary key columns.
          type: array
          items:
            type: string
        columns:
          description: List of table columns (optional, only for file workspace).
          type: array
          items:
            type: string
          nullable: true
        distributionKey:
          description: Distribution key columns (for Synapse).
          type: array
          items:
            type: string
        timestampType:
          description: Type of internal timestamp column only MANAGED value now supported, meaning that _timestamp column managed by storage is created.
          type: string
          nullable: true
          default: MANAGED
      type: object
    BucketOwnerDetailResponse:
      required:
      - id
      - name
      - email
      properties:
        id:
          description: Owner identifier.
          type: integer
        name:
          description: Owner name.
          type: string
        email:
          description: Owner email address.
          type: string
      type: object
    BucketListingDeleteResponse:
      required:
      - id
      - status
      - url
      - operationName
      - operationParams
      - createdTime
      - creatorToken
      - metrics
      properties:
        id:
          description: Job ID.
          type: integer
        status:
          description: Job status.
          type: string
        url:
          description: URL to retrieve job details.
          type: string
        tableId:
          description: Table identifier if applicable.
          type: string
          nullable: true
        operationName:
          description: Name of the operation.
          type: string
        operationParams:
          description: Parameters passed to the operation.
          type: object
          additionalProperties:
            type: mixed
        createdTime:
          description: Job creation timestamp.
          type: string
          format: date-time
        startTime:
          description: Job start timestamp.
          type: string
          format: date-time
          nullable: true
        endTime:
          description: Job completion timestamp.
          type: string
          format: date-time
          nullable: true
        runId:
          description: Unique run identifier.
          type: string
          nullable: true
        results:
          description: Operation results; content varies.
          type: object
          nullable: true
        creatorToken:
          description: Creator token information.
          properties:
            id:
              description: ID of the token that created this job.
              type: integer
            description:
              description: Description of the creator token.
              type: string
              nullable: true
          type: object
        metrics:
          description: Job execution metrics.
          type: object
          additionalProperties:
            type: mixed
        error:
          description: Job error information if the job failed.
          properties:
            code:
              description: Error code if job failed.
              type: string
              nullable: true
            message:
              description: Error message if job failed.
              type: string
              nullable: true
            exceptionId:
              description: Exception identifier.
              type: string
              nullable: true
          type: object
          nullable: true
      type: object
    TableSnapshotCreateJobResult:
      required:
