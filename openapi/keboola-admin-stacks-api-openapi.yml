openapi: 3.0.0
info:
  title: AI Service Actions Admin Stacks API
  version: 1.0.0
  contact:
    email: devel@keboola.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
- name: Admin Stacks
paths:
  /admin/stacks:
    get:
      tags:
      - Admin Stacks
      summary: List stacks
      description: List all available KBC stacks. Requires an admin token.
      responses:
        '200':
          description: List of stacks
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
              - connection.keboola.com
              - connection-eu-west-1.keboola.com
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-StorageApi-Token
