              type: integer
            inBytesUncompressed:
              description: Input bytes uncompressed.
              type: integer
            outCompressed:
              description: Output is compressed.
              type: boolean
            outBytes:
              description: Output bytes.
              type: integer
            outBytesUncompressed:
              description: Output bytes uncompressed.
              type: integer
          type: object
        error:
          description: Error details if the job failed.
          properties:
            code:
              description: Error code.
              type: string
            message:
              description: Error message.
              type: string
            exceptionId:
              description: Exception identifier.
              type: string
            contextParams:
              description: Context parameters for the error.
              type: object
              nullable: true
            uuid:
              description: Error UUID.
              type: string
              nullable: true
          type: object
          nullable: true
      type: object
    TableSwapResult:
      required:
      - tableAStringId
      - tableBStringId
      properties:
        tableAStringId:
          type: string
        tableBStringId:
          type: string
      type: object
    TableExportJobResponse:
      properties:
        file:
          properties:
            id:
              type: integer
              nullable: true
          type: object
          nullable: true
      type: object
    InputMappingLoadDryRunResponse:
      required:
      - dryRun
      - operationName
      - input
      properties:
        dryRun:
          type: boolean
        operationName:
          type: string
        input:
          type: array
          items:
            required:
            - source
            - destination
            - loadType
            - possibleLoadTypes
            properties:
              source:
                type: string
              destination:
                type: string
              loadType:
                type: string
                enum:
                - COPY
                - CLONE
                - VIEW
              possibleLoadTypes:
                type: array
                items:
                  type: string
                  enum:
                  - COPY
                  - CLONE
                  - VIEW
            type: object
      type: object
    WorkspaceDetailResponse:
      required:
      - id
      - type
      - created
      - connection
      - statementTimeoutSeconds
      - creatorToken
      - readOnlyStorageAccess
      properties:
        id:
          description: ID of the workspace.
          type: integer
        type:
          description: Type of the workspace.
          type: string
          enum:
          - file
          - table
        name:
          description: Name of the workspace (schema name for table type).
          type: string
          nullable: true
        component:
          description: ID of the component that created the workspace.
          type: string
          nullable: true
        configurationId:
          description: ID of the configuration that created the workspace.
          type: string
          nullable: true
        configurationVersion:
          description: Pinned configuration version.
          type: integer
          nullable: true
        created:
          description: Date and time of workspace creation.
          type: string
          format: date-time
        connection:
          description: Connection details for the workspace.
          type: object
          oneOf:
          - required:
            - backend
            - host
            - user
            - loginType
            - ssoLoginAvailable
            properties:
              backend:
                description: Workspace backend type.
                type: string
                enum:
                - snowflake
                - bigquery
              region:
                description: Region of the workspace backend.
                type: string
                nullable: true
              host:
                description: Hostname of the workspace backend.
                type: string
              database:
                description: Database name (project name for Snowflake).
                type: string
                nullable: true
              schema:
                description: Schema name.
                type: string
                nullable: true
              warehouse:
                description: Warehouse name (for Snowflake).
                type: string
                nullable: true
              user:
                description: Username for connecting to the workspace. Empty when loginType is "none".
                type: string
              loginType:
                description: Login type used for the connection. Value "none" means the workspace has no direct credentials and is intended for QueryService. Create direct connection credentials later using the workspace credentials endpoint.
                type: string
                enum:
                - default
                - snowflake-legacy-service
                - snowflake-person-sso
                - snowflake-person-keypair
                - snowflake-service-keypair
                - none
              ssoLoginAvailable:
                description: Indicates if SSO login is available.
                type: boolean
          - required:
            - backend
            properties:
              backend:
                description: File storage backend type (e.g., azure, aws).
                type: string
              container:
                description: Container name for file storage.
                type: string
                nullable: true
              region:
                description: Region of the file storage.
                type: string
                nullable: true
        backendSize:
          description: Size of the backend (e.g., for Snowflake).
          type: string
          nullable: true
        statementTimeoutSeconds:
          description: Statement timeout in seconds.
          type: integer
        creatorToken:
          required:
          - id
          properties:
            id:
              description: ID of the token that created the workspace.
              type: integer
            description:
              description: Description of the token.
              type: string
              nullable: true
          type: object
        readOnlyStorageAccess:
          description: Indicates if read-only storage access is enabled.
          type: boolean
        platformUsageType:
          description: Platform usage type.
          type: string
          nullable: true
      type: object
    InputMappingLoadRequest:
      required:
      - input
      properties:
        input:
          type: array
          items:
            description: 'An input-mapping table item. `source` and `destination` are required. When `where_column` is set, `where_values` must be non-empty (and vice versa). `load_type` explicitly selects the load type (COPY/CLONE/VIEW); omit it or use AUTO to let the server pick. The legacy boolean `use_view` is still accepted as an alias for `load_type: VIEW` (cannot be combined with a conflicting `load_type`).'
            required:
            - source
            - destination
            properties:
              source:
                type: string
              source_branch_id:
                type: integer
              destination:
                type: string
              days:
                type: integer
                nullable: true
              changed_since:
                type: string
                nullable: true
              columns:
                type: array
                items:
                  type: string
              column_types:
                type: array
                items:
                  required:
                  - source
                  properties:
                    source:
                      type: string
                    type:
                      type: string
                    destination:
                      type: string
                    length:
                      oneOf:
                      - type: string
                      - type: integer
                    nullable:
                      type: boolean
                    convert_empty_values_to_null:
                      type: boolean
                    compression:
                      type: string
                  type: object
              where_column:
                type: string
              where_values:
                type: array
                items:
                  type: string
              where_operator:
                type: string
                enum:
                - eq
                - ne
              limit:
                type: integer
              overwrite:
                type: boolean
              load_type:
                type: string
                enum:
                - COPY
                - CLONE
                - VIEW
                - AUTO
              use_view:
                description: 'Legacy alias for `load_type: VIEW`. Kept for backward compatibility.'
                type: boolean
              keep_internal_timestamp_column:
                type: boolean
              incremental:
                type: boolean
              file_type:
                type: string
            type: object
        preserve:
          type: boolean
          default: false
      type: object
    BucketListingUpdateJobResponse:
      required:
      - bucketId
      - exposureName
      - bigquery
      properties:
        bucketId:
          type: string
        exposureName:
          type: string
        exposureDescription:
          type: string
          nullable: true
        bigquery:
          properties:
            listingId:
              type: string
            subscribers:
              type: array
              items:
                type: string
          type: object
      type: object
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-StorageApi-Token
