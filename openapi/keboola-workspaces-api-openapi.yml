        '400':
          description: Invalid request — validation error, unsupported option, or duplicate destination.
        '403':
          description: Caller does not have access to the requested source table.
        '404':
          description: Workspace, source bucket, or source table not found.
        '422':
          description: Unsupported workspace backend for the requested load.
  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/credentials:
    post:
      tags:
      - Workspaces
      summary: Get workspace credentials
      description: Returns workspace credentials for BigQuery or Snowflake backends. Creates credentials if they do not exist.
      operationId: post_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/credentials::WorkspaceStorageCredentialsCreateAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Workspace credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceDetailResponseWithSecret'
        '404':
          description: Returned when the workspace is not found.
        '400':
          description: Returned when the workspace backend is not supported (only BigQuery and Snowflake are supported).
  /v2/storage/workspaces/{workspaceId}/credentials:
    post:
      tags:
      - Workspaces
      summary: Get workspace credentials
      description: Returns workspace credentials for BigQuery or Snowflake backends. Creates credentials if they do not exist.
      operationId: post_/v2/storage/workspaces/{workspaceId}/credentials::WorkspaceStorageCredentialsCreateAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      responses:
        '200':
          description: Workspace credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceDetailResponseWithSecret'
        '404':
          description: Returned when the workspace is not found.
        '400':
          description: Returned when the workspace backend is not supported (only BigQuery and Snowflake are supported).
  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/credentials/{id}:
    get:
      tags:
      - Workspaces
      summary: Get specific workspace credential
      description: Returns details of a specific workspace credential by ID.
      operationId: get_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/credentials/{id}::WorkspaceStorageCredentialsDetailAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: id
        in: path
        description: ID of the credential.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Workspace credential details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceDetailResponseWithSecret'
        '404':
          description: Returned when the workspace or credential is not found.
    delete:
      tags:
      - Workspaces
      summary: Delete workspace credential
      description: Deletes a specific workspace credential from both the database and the backend (BigQuery or Snowflake).
      operationId: delete_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/credentials/{id}::WorkspaceStorageCredentialsDeleteAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: id
        in: path
        description: ID of the credential.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Credential successfully deleted
        '404':
          description: Returned when the workspace or credential is not found.
  /v2/storage/workspaces/{workspaceId}/credentials/{id}:
    get:
      tags:
      - Workspaces
      summary: Get specific workspace credential
      description: Returns details of a specific workspace credential by ID.
      operationId: get_/v2/storage/workspaces/{workspaceId}/credentials/{id}::WorkspaceStorageCredentialsDetailAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: id
        in: path
        description: ID of the credential.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      responses:
        '200':
          description: Workspace credential details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceDetailResponseWithSecret'
        '404':
          description: Returned when the workspace or credential is not found.
    delete:
      tags:
      - Workspaces
      summary: Delete workspace credential
      description: Deletes a specific workspace credential from both the database and the backend (BigQuery or Snowflake).
      operationId: delete_/v2/storage/workspaces/{workspaceId}/credentials/{id}::WorkspaceStorageCredentialsDeleteAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: id
        in: path
        description: ID of the credential.
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      responses:
        '204':
          description: Credential successfully deleted
        '404':
          description: Returned when the workspace or credential is not found.
  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/table-export:
    post:
      tags:
      - Workspaces
      summary: Export table from workspace
      description: 'Export existing table from workspace to a file in the storage backend connected to the workspace.


        Initial response returns job details [JobResponse](#model-JobResponse). The result of the asynchronous job can be fetched via `/v2/storage/jobs/{id}`. When the job completes, final result is [TableExportJobResponse](#model-TableExportJobResponse).'
      operationId: post_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/table-export::WorkspaceTableExportAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: \d+
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        description: Table, file name and file type to export.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceTableExportRequest'
      responses:
        '404':
          description: Returned when the workspace or table is not found.
        '400':
          description: Returned when the workspace backend is not supported (only Snowflake is supported so far).
        '202':
          description: Job accepted; returns job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          x-storage-job-result:
            application/json:
              schema:
                $ref: '#/components/schemas/TableExportJobResponse'
      x-storage-job-result:
        application/json:
          schema:
            $ref: '#/components/schemas/TableExportJobResponse'
  /v2/storage/workspaces/{workspaceId}/table-export:
    post:
      tags:
      - Workspaces
      summary: Export table from workspace
      description: 'Export existing table from workspace to a file in the storage backend connected to the workspace.


        Initial response returns job details [JobResponse](#model-JobResponse). The result of the asynchronous job can be fetched via `/v2/storage/jobs/{id}`. When the job completes, final result is [TableExportJobResponse](#model-TableExportJobResponse).'
      operationId: post_/v2/storage/workspaces/{workspaceId}/table-export::WorkspaceTableExportAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace.
        required: true
        schema:
          type: integer
          pattern: \d+
      requestBody:
        description: Table, file name and file type to export.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceTableExportRequest'
      responses:
        '404':
          description: Returned when the workspace or table is not found.
        '400':
          description: Returned when the workspace backend is not supported (only Snowflake is supported so far).
        '202':
          description: Job accepted; returns job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
          x-storage-job-result:
            application/json:
              schema:
                $ref: '#/components/schemas/TableExportJobResponse'
      x-storage-job-result:
        application/json:
          schema:
            $ref: '#/components/schemas/TableExportJobResponse'
  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/unload:
    post:
      tags:
      - Workspaces
      summary: Unload workspace
      description: Unloads data from workspace tables with direct-grant output mapping strategy. Returns array of jobs.
      operationId: post_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/unload::WorkspaceUnloadAction
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier.
        required: true
        schema:
          type: integer
          pattern: \d+
      - name: only-direct-grants
        in: query
        description: Filter to only process tables with direct-grant strategy.
        required: false
        schema:
          type: boolean
      - name: onlyDirectGrants
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Workspace unload jobs enqueued.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          description: Returned when configuration is not found, pinned configuration version no longer exists, or a table referenced in pinned version no longer exists.
        '404':
          description: Returned when the workspace is not found.
  /v2/storage/branch/{branchId}/workspaces/{workspaceId}/query:
    post:
      tags:
      - Workspaces
      summary: Execute SQL query in a workspace
      description: '**Deprecated.** This endpoint is deprecated and scheduled for removal on 2026-09-01. There is no direct replacement. Executes the provided SQL query in the specified workspace and returns the result data.'
      operationId: post_/v2/storage/branch/{branchId}/workspaces/{workspaceId}/query::WorkspacesQueryAction
      parameters:
      - name: workspaceId
        in: path
        description: ID of the workspace to run the query against
        required: true
        schema:
          type: integer
          pattern: '[1-9][0-9]*'
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/ExecuteQueryRequest'
      responses:
        '200':
          description: Query execution response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteQueryResponse'
        '400':
          description: Returned when the provided query is invalid or not supported.
        '404':
          description: Returned when the specified workspace is not found.
      deprecated: true
components:
